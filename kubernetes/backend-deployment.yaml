apiVersion: apps/v1
kind: Deployment
metadata:
  name: resumeai-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: resume-analyser-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: resumeai-secret
                  key: GROQ_API_KEY