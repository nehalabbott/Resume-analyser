version: '3.9'

services:
  backend:
    build: ./backend
    container_name: resumeai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: resumeai-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
